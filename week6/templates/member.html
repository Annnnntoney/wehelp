<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歡迎光臨，這是會員頁</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="card">
    <div class="card__header">歡迎光臨，這是會員頁</div>

    <!-- Task 3：顯示登入者名稱 / Task 4：登出連結 -->
    <div class="card__body card__body--center">
      <p class="greeting"><strong>{{ user.name }}</strong>，歡迎登入系統</p>
      <a href="/logout">登出系統</a>
    </div>

    <!-- Task 5：留言表單 -->
    <div class="card__body card__body--split">
      <h2 class="card__title">快來留言吧</h2>
      <form id="messageForm">
        <div class="field">
          <label>內容</label>
          <input type="text" id="messageInput" autocomplete="off">
        </div>
        <button type="submit">送出</button>
      </form>
    </div>

    <!-- Task 5：留言列表（由 JS 渲染，不是後端模板）-->
    <div class="card__body card__body--split card__body--center">
      <div id="messageList"></div>
    </div>
  </div>

  <script src="/static/member.js"></script>
</body>
</html>
