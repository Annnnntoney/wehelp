<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歡迎光臨，請註冊登入系統</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="card">
    <div class="card__header">歡迎光臨，請註冊登入系統</div>

    <!-- Task 2：註冊表單（2 個 text + 1 個 password）-->
    <div class="card__body">
      <h2 class="card__title">註冊帳號</h2>
      <form id="signupForm" action="/signup" method="post">
        <div class="field">
          <label>姓名</label>
          <input type="text" name="name">
        </div>
        <div class="field">
          <label>信箱</label>
          <input type="text" name="email">
        </div>
        <div class="field">
          <label>密碼</label>
          <input type="password" name="password">
        </div>
        <button type="submit">註冊</button>
      </form>
    </div>

    <!-- Task 3：登入表單（1 個 text + 1 個 password）-->
    <div class="card__body card__body--split">
      <h2 class="card__title">登入系統</h2>
      <form id="loginForm" action="/login" method="post">
        <div class="field">
          <label>信箱</label>
          <input type="text" name="email">
        </div>
        <div class="field">
          <label>密碼</label>
          <input type="password" name="password">
        </div>
        <button type="submit">登入</button>
      </form>
    </div>
  </div>

  <script>
    // Task 2、3：送出前檢查有沒有空欄位，有的話就攔下來不送出
    function blockEmptySubmit(formId, message) {
      const form = document.getElementById(formId);
      form.addEventListener("submit", (e) => {
        for (const input of form.querySelectorAll("input")) {
          if (input.value.trim() === "") {
            e.preventDefault();
            alert(message);
            return;
          }
        }
      });
    }

    blockEmptySubmit("signupForm", "請輸入姓名、信箱和密碼");
    blockEmptySubmit("loginForm", "請輸入信箱和密碼");
  </script>
</body>
</html>
